<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кабинет // SHRTIK</title>
  <link rel="stylesheet" href="../static/app.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo">SHRTIK</a>
    <nav>
      <a href="cabinet.html">/cabinet</a>
      <a href="auth.html">/logout</a>
    </nav>
  </header>

  <main>
    <div class="cabinet">
      <h1>Кабинет</h1>

      <div class="stats-row">
        <div class="stat-card">
          <span class="num">0</span>
          <span class="lbl">// ссылок</span>
        </div>
        <div class="stat-card">
          <span class="num">0</span>
          <span class="lbl">// переходов</span>
        </div>
        <div class="stat-card">
          <span class="num">—</span>
          <span class="lbl">// сегодня</span>
        </div>
      </div>

      <form class="search-form">
        <input type="search" name="q" placeholder="Поиск по ссылкам...">
        <button type="submit">Поиск</button>
      </form>

    </div>
  </main>

  <footer>// все ссылки защищены</footer>

  <!-- Скрипты (utils.js теперь подключен!) -->
  <script src="../static/mock.js"></script>
  <script src="../static/api.js"></script>
  <script src="../static/utils.js"></script>
  <script src="../static/cabinet.js"></script>
</body>
</html>
