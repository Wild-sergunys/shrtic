services:
  db:
    image: postgres:16-alpine
    container_name: shrtic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-shrtic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shrtic}
      POSTGRES_DB: ${DB_NAME:-shrtic}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-shrtic}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shrtic_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: shrtic_app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-shrtic}
      DB_PASSWORD: ${DB_PASSWORD:-shrtic}
      DB_NAME: ${DB_NAME:-shrtic}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-24h}
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

volumes:
  db_data: